    <style>
      #splash-screen {
        position: fixed;
        inset: 0;
        background: #FFFFFF;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        transition: opacity 0.5s ease-out;
      }
      .splash-logo {
        width: 80px;
        height: 80px;
        background: #0A0A0B;
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #00D1FF;
        font-family: 'Outfit', sans-serif;
        font-weight: 900;
        font-size: 24px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        margin-bottom: 24px;
      }
      .splash-loader {
        width: 40px;
        height: 2px;
        background: #F1F5F9;
        border-radius: 2px;
        overflow: hidden;
        position: relative;
      }
      .splash-loader::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        width: 50%;
        background: #00D1FF;
        animation: splash-load 1.5s infinite ease-in-out;
      }
      @keyframes splash-load {
        0% { left: -50%; }
        100% { left: 100%; }
      }
    </style>
    <script type="module" crossorigin src="/assets/index-BCDhHmqq.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-Bp848Q0M.css">
  </head>
  <body>
    <div id="splash-screen">
      <div class="splash-logo">Z</div>
      <div class="splash-loader"></div>
    </div>
    <div id="root"></div>
    <script>
      window.addEventListener('load', () => {
        const splash = document.getElementById('splash-screen');
        if (splash) {
          setTimeout(() => {
            splash.style.opacity = '0';
            setTimeout(() => splash.remove(), 500);
          }, 800);
        }
      });
    </script>
  </body>
